<!DOCTYPE html>
<html lang="en">
	<head>
		<meta name="description" content="Helios DAC WebUSB Demo">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Helios DAC Demo</title>
	</head>
	<body>
		<div>
			<button id="connectBtn">Connect Helios Laser DAC</button>
			<button id="disconnectBtn" disabled>Disconnect All</button>
			<button id="playBtn" disabled>Play</button>
			<button id="stopBtn" disabled>Stop</button>
			<div id="statusLogElm"></div>
		</div>
		<script type="module">
			import { HeliosPoint, connectHeliosDevice, getHeliosDevices } from '/dist/helios_dac.js';

			const DWELL   = 12;   //  blanked settle points at each end of the line
			const SAMPLES = 256;  //  lit points per frame
			const DASH    = 20;   //  lit points per dash
			const GAP     = 10;   //  blanked points per gap

			function buildFrame() {
				const frame = [];
				const y = Math.floor((Math.sin(Date.now() / 1000) * 0.5 + 0.5) * 4095);

				for (let i = 0; i < DWELL; i++)
					frame.push(new HeliosPoint(0, y, 0, 0, 0));

				const period = DASH + GAP;
				for (let i = 0; i < SAMPLES; i++) {
					const x        = Math.floor(i / SAMPLES * 4095);
					const posInPeriod = i % period;
					if (posInPeriod < GAP) {
						frame.push(new HeliosPoint(x, y, 0, 0, 0));
					} else {
						const dashIndex = Math.floor(i / period);
						const r = dashIndex % 2 === 0 ? 255 : 0;
						const b = dashIndex % 2 === 0 ? 0   : 255;
						frame.push(new HeliosPoint(x, y, r, 0, b));
					}
				}

				for (let i = 0; i < DWELL; i++)
					frame.push(new HeliosPoint(4095, y, 0, 0, 0));

				return frame;
			}

			let heliosDevices = [];

			async function connectDevices() {
				const statusLogElm = document.getElementById('statusLogElm');
				statusLogElm.innerHTML = '';
				heliosDevices = await getHeliosDevices();
				window.heliosDevices = heliosDevices;

				for (const [index, device] of heliosDevices.entries()) {
					device.onFrame = (device) => device.sendFrame(buildFrame(), 30000, true);
					await device.connect();
					statusLogElm.innerHTML +=
						`Device [${index} - ${device.name}] ` +
						`${device.productName} by ${device.manufacturerName} ` +
						`firmware v${device.firmwareVersion}<br>`;
					await device.start();
				}

				document.getElementById('disconnectBtn').disabled = heliosDevices.length === 0;
				document.getElementById('playBtn').disabled       = heliosDevices.length === 0;
			}

			document.addEventListener('DOMContentLoaded', async () => {
				document.getElementById('connectBtn').addEventListener('click', async () => {
					try {
						await connectHeliosDevice();
						await connectDevices();
					} catch (error) {
						console.error('connect', error);
					}
				});

				document.getElementById('playBtn').addEventListener('click', () => {
					heliosDevices.forEach(d => d.start());
					document.getElementById('playBtn').disabled = true;
					document.getElementById('stopBtn').disabled = false;
				});

				document.getElementById('stopBtn').addEventListener('click', () => {
					heliosDevices.forEach(d => d.stop());
					document.getElementById('stopBtn').disabled = true;
					document.getElementById('playBtn').disabled = false;
				});

				document.getElementById('disconnectBtn').addEventListener('click', async () => {
					for (const d of heliosDevices) await d.close();
					heliosDevices = [];
					document.getElementById('stopBtn').disabled     = true;
					document.getElementById('disconnectBtn').disabled = true;
					document.getElementById('playBtn').disabled     = true;
					document.getElementById('statusLogElm').innerHTML = 'Disconnected.<br>';
				});

				await connectDevices();
			});
		</script>
	</body>
</html>
