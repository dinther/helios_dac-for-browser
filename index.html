<!DOCTYPE html>
<html lang="en" class="nowhitespace">
	<head>
		<meta name="description" content="Web USB">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Web USB</title>
		<style>
			#scanline {
				position: relative;
    			border-top: 1px solid #ffff00a1;
    		    width: 256px;
    			height: 3px;
			}
		</style>
	</head>
	<body>
		<div id="container">
			<div id="buttoncontainer">
				<button id="connectBtn">Connect Helios Laser DAC</button>
				<button id="disconnectBtn" disabled>Disconnect All</button>
				<button id="playBtn" disabled>Play</button>
				<button id="stopBtn" disabled>Stop</button>
				<button id="newBtn">New Gradient</button><br>
				Brightness <input id="brightness" type="range" min="0" max="1" step="0.01" value="0.20">
				<div id="statusLogElm"></div>
			</div>
			<div id="canvascontainer">
				<div id="scanline"></div>
			</div>
		</div>
		<script type="module">
            import {HeliosPoint, connectHeliosDevice, getHeliosDevices, HeliosDevice} from '/lib/helios_dac.js';
			import {Gradient2D} from '/lib/gradient2d.js';

			let statusLogElm;
			let connectBtn;
			let disconnectBtn;
			let playBtn;
			let stopBtn;
			let gradient2d = new Gradient2D(256, 256, document.querySelector('#canvascontainer'));
			let colors = new Uint8Array( 256 * 4 );  //  one line worth
			let scanline = document.querySelector('#scanline');
			let brightness = 0.2;
			let colorBuffer;

			gradient2d.canvas.style.touchAction = 'none';

			gradient2d.render();

			randomColorStops();

			function randomColorStops(){
				gradient2d.stop();
				gradient2d.clear();
				let numColors = Math.floor(Math.random() * 50);
				for (let i=0; i< numColors; i++){
					gradient2d.addColorStop(Math.random(), Math.random(), Math.random()*2.5, Math.random(), Math.random(), Math.random());
				}
				gradient2d.render();
				gradient2d.getColors(0,0,256,256).then((data)=>{
				colorBuffer = data;
			});
			}

			function easeOutBounce(x){
				const n1 = 7.5625;
				const d1 = 2.75;
				if (x < 1 / d1) {
					return n1 * x * x;
				} else if (x < 2 / d1) {
					return n1 * (x -= 1.5 / d1) * x + 0.75;
				} else if (x < 2.5 / d1) {
					return n1 * (x -= 2.25 / d1) * x + 0.9375;
				} else {
					return n1 * (x -= 2.625 / d1) * x + 0.984375;
				}
			}

			async function getHeliosDevicesUI(){
				statusLogElm.innerHTML = '';
				let heliosDevices = [];
				let c = 0;
				let fw = 1.0;
				let fh = 0.05;
				let samples = 256;
				let xoffset = Math.floor(((1-fw)/2) * 4096);
				let yoffset = 4095 - Math.floor(fh * 4096);
				try{
					heliosDevices = await getHeliosDevices();
					window.heliosDevices = heliosDevices;
					heliosDevices.forEach( async (device, index)=>{
						device.onFrame = (device)=>{  //  send one scan line per frame
							let frame = [];
							let d =Date.now();
							let duration = 6000; // ms
							let l = d%duration / duration;
							let fy = (Math.sin(2*Math.PI*l)+1)/2
							let fx;

							scanline.style.top = fy*scanline.parentElement.offsetHeight+'px';

							for(let x=0; x<samples; x++){
								fx = x/samples;
								let color = getColorFromBuffer(fx, fy, brightness);
								frame.push(new HeliosPoint(2048, 2048, 255, 255, 255));
								//frame.push(new HeliosPoint((fx*fw*4096)+xoffset, yoffset, color[0], color[1], color[2]));
							}

							device.sendFrame(frame, 30000, true);
						};
						await device.connect();
						statusLogElm.innerHTML +=
							'Device [' + index + ' - ' + device.name +'] ' +
							'Connected to: ' + device.productName +
							' manufacturer: ' + device.manufacturerName +
							' firmware version: ' + device.firmwareVersion +
							'<br>';
						await device.start();
					});
					disconnectBtn.disabled = false;
					playBtn.disabled = false;
				} catch (error){
					console.log('getHeliosDevicesUI', error);
				}
				return heliosDevices;
			};

			function getColorFromBuffer(x, y, brightness=0.5){
				let bw = gradient2d.canvas.width;
				let bh = gradient2d.canvas.height;
				let b = 4;  // bytes per point
				let by = Math.floor(y * bh) * bw * b;
				let bx = Math.floor(x * bw) * b;
				let ci = by + bx;
				return [Math.floor(colorBuffer[ci]*brightness), Math.floor(colorBuffer[ci+1]*brightness), Math.floor(colorBuffer[ci+2]*brightness)];
			}

			document.addEventListener('DOMContentLoaded', async () => {
				statusLogElm = document.getElementById('statusLogElm');
				connectBtn = document.getElementById('connectBtn');
				disconnectBtn = document.getElementById('disconnectBtn');
				playBtn = document.getElementById('playBtn');
				stopBtn = document.getElementById('stopBtn');
				connectBtn.addEventListener('click', async () => {
					try{
						await connectHeliosDevice();
						heliosDevices = await getHeliosDevicesUI();
					} catch (error){
						console.log('connectHeliosDevice', error);
					}
				});

				playBtn.addEventListener('click', async () => {
					statusLogElm.innerHTML += 'Starting devices....';
					heliosDevices.forEach( async (device, index)=>{
						device.start();
					});
					statusLogElm.innerHTML += 'started<br>';
					playBtn.disabled = true;
					stopBtn.disabled = false;
				});

				stopBtn.addEventListener('click', async () => {
					try{
						statusLogElm.innerHTML += 'Stopping devices....';
						heliosDevices.forEach( async (device, index)=>{
							device.stop();
						});
						statusLogElm.innerHTML += 'Stopped.<br>';
						stopBtn.disabled = true;
						playBtn.disabled = false;
					} catch (err){
						console.log(err);
					}
				});

				disconnectBtn.addEventListener('click', async () => {
					try{
						statusLogElm.innerHTML += 'Closing devices....';
						for (let j = 0; j < heliosDevices.length; j++) {
							await heliosDevices[j].close();
						}
						statusLogElm.innerHTML += 'closed<br>';
						stopBtn.disabled = true;
						disconnectBtn.disabled = true;
						playBtn.disabled = true;
					} catch (err){
						console.log(err);
					}
				});

				document.getElementById('newBtn').addEventListener('click', ()=>{
					randomColorStops();
				});

				document.getElementById('brightness').addEventListener('input', (event)=>{
					brightness = event.target.value;
				});

				let heliosDevices = await getHeliosDevicesUI();
			});

			function hsvToRgb(h, s, v) {
				var r, g, b;

				var i = Math.floor(h * 6);
				var f = h * 6 - i;
				var p = v * (1 - s);
				var q = v * (1 - f * s);
				var t = v * (1 - (1 - f) * s);

				switch (i % 6) {
					case 0: r = v, g = t, b = p; break;
					case 1: r = q, g = v, b = p; break;
					case 2: r = p, g = v, b = t; break;
					case 3: r = p, g = q, b = v; break;
					case 4: r = t, g = p, b = v; break;
					case 5: r = v, g = p, b = q; break;
				}

				return [ Math.floor(r * 255), Math.floor(g * 255), Math.floor( b * 255) ];
				}
		</script>
	</body>
</html>
